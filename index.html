<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Portfolio</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
  <h2>MyPort</h2>
  <ul>
    <li onclick="showPanel('home')">Home</li>
    <li onclick="showPanel('about')">About</li>
    <li onclick="showPanel('skills')">Skills</li>
    <li onclick="showPanel('projects')">Projects</li>
    <li onclick="showPanel('contact')">Contact</li>
  </ul>
</div>

<!-- Main -->
<div class="main">

  <div id="home" class="panel active">
    <h1>Hi, I'm Tamilanda 👋</h1>
    <p>Frontend Developer | Student</p>
    <button>View Work</button>
  </div>

  <div id="about" class="panel">
    <h2>About Me</h2>
    <p>I am a student learning web development and building cool UI designs.</p>
  </div>

  <div id="skills" class="panel">
    <h2>Skills</h2>
    <span>HTML</span>
    <span>CSS</span>
    <span>JavaScript</span>
  </div>

  <div id="projects" class="panel">
    <h2>Projects</h2>
    <p>Portfolio Website</p>
    <button onclick="alert('Project Opening...')">Open</button>
  </div>

  <div id="contact" class="panel">
    <h2>Contact</h2>
    <p>Email: you@email.com</p>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
